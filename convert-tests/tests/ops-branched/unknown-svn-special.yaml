svn-revs:
  - props:
      svn:log: init
    nodes:
      - path: trunk
        kind: dir
        action: add
      - path: trunk/x
        kind: file
        action: add
        props:
          svn:special: "*"
        text: "not a symlink"
  - props:
      svn:log: convert to symlink
    nodes:
      - path: trunk/x
        kind: file
        action: change
        text: "link target"

conv-params: |
  branches = ["trunk"]
  head = "trunk"

logs: |
  W svn2git::convert::stage1: unknown "svn:special" file kind at "trunk/x" in SVN dump

git-revs:
  - rev: trunk~1
    tree:
      x:
        type: normal
        data: "not a symlink"
  - rev: trunk~0
    tree:
      x:
        type: symlink
        target: "target"
